name: Test and Publish Devcontainer Features

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dev Containers CLI
        run: npm install -g @devcontainers/cli

      - name: Run Devcontainer Feature Tests
        run: |
          devcontainer features test \
            --skip-autogenerated \
            .

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish All Features to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Iterate through each subdirectory in src/ to publish all features
          for feature_dir in src/*/; do
            if [ -d "$feature_dir" ]; then
              echo "Publishing feature from: $feature_dir"
              devcontainer features publish \
                --namespace "$OWNER_LOWER/devcontainer-features" \
                "$feature_dir"
            fi
          done
